name: WifiManager
options:
  bundleIdPrefix: com.vincent
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "16.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_APP_SANDBOX: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  WifiManager:
    type: application
    platform: macOS
    sources:
      - path: WifiManager/Sources
      - path: WifiManager/Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: Sparkle
    info:
      path: WifiManager/Info.plist
      properties:
        CFBundleDisplayName: WifiManager
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticGraphicsSwitching: true
        NSLocationWhenInUseUsageDescription: "WifiManager utilise votre localisation pour suggérer le meilleur réseau WiFi selon votre lieu."
        NSLocationAlwaysAndWhenInUseUsageDescription: "WifiManager utilise votre localisation pour changer automatiquement de réseau WiFi selon votre lieu."
        SUFeedURL: "https://raw.githubusercontent.com/vincentlauriat/WifiManager/main/appcast.xml"
        SUPublicEDKey: "fsT0Pbi8A8rd6ppCaWbnRMVy+YvJ+v/uVJxU78GqdW4="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUAutomaticallyUpdate: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.WifiManager
        PRODUCT_NAME: WifiManager
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
