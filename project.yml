name: WifiManager
options:
  bundleIdPrefix: com.vincent
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "16.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "KFLACS69T9"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_APP_SANDBOX: NO
    SWIFT_STRICT_CONCURRENCY: targeted
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  WifiManager:
    type: application
    platform: macOS
    sources:
      - path: WifiManager/Sources
      - path: WifiManager/Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: Sparkle
    info:
      path: WifiManager/Info.plist
      properties:
        CFBundleDisplayName: WifiManager
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticGraphicsSwitching: true
        NSLocationWhenInUseUsageDescription: "WifiManager utilise votre localisation pour suggérer le meilleur réseau WiFi selon votre lieu."
        NSLocationAlwaysAndWhenInUseUsageDescription: "WifiManager utilise votre localisation pour changer automatiquement de réseau WiFi selon votre lieu."
        SUFeedURL: "https://raw.githubusercontent.com/vincentlauriat/WifiManager/main/appcast.xml"
        SUPublicEDKey: "9PD2SBwLL4XoycyAGzaE+gO7ctuxSfuFMMajiZdXhXQ="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUAutomaticallyUpdate: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.WifiManager
        PRODUCT_NAME: WifiManager
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
    scheme:
      testTargets:
        - WifiManagerTests

  WifiManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WifiManagerTests
    dependencies:
      - target: WifiManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincent.WifiManagerTests
        GENERATE_INFOPLIST_FILE: YES
        # Match the host's Team ID — the hardened-runtime host enforces library
        # validation and rejects a differently-signed (adhoc) test bundle.
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: "KFLACS69T9"
